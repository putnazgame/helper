<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12121e">
<title>โปรแกรมช่วยเหลือ</title>
<style>
:root {
  --bg:      #12121e;
  --card-n:  #2a2c44;
  --card-s:  #1c62d0;
  --card-b:  #5088ff;
  --text:    #f0f0f0;
  --title:   #64beff;
  --yes:     #1a7840;
  --no:      #992222;
  --stat:    #8cff8c;
  --panel:   #1c1c34;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sarabun', 'Tahoma', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  flex-shrink: 0;
  min-height: 64px;
}
header h1 { font-size: clamp(24px, 4vw, 40px); color: var(--title); }
#editBtn {
  background: rgba(80,136,255,.15);
  border: 2px solid var(--card-b);
  color: var(--title);
  padding: 8px 18px;
  border-radius: 12px;
  font-size: clamp(16px, 2.5vw, 24px);
  cursor: pointer;
  font-family: inherit;
}

/* ── Card grid ── */
#grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 10px 16px;
  overflow-y: auto;
  align-content: start;
}
@media (max-width: 480px) {
  #grid { grid-template-columns: repeat(2, 1fr); }
}

.card {
  background: var(--card-n);
  border-radius: 18px;
  border: 3px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: clamp(20px, 3.2vw, 38px);
  padding: 14px 10px;
  min-height: clamp(90px, 14vh, 140px);
  cursor: pointer;
  position: relative;
  transition: background .12s, border-color .12s, transform .08s;
  word-break: break-word;
  line-height: 1.35;
}
.card:active  { transform: scale(.96); }
.card.active  { background: var(--card-s); border-color: var(--card-b); }

/* การ์ดในโหมดแก้ไข — แตะทั้งการ์ดเพื่อลบ */
.edit-mode .card {
  background: #4a1a1a;
  border-color: #cc3333;
  cursor: pointer;
}
.edit-mode .card::after {
  content: "✕ แตะเพื่อลบ";
  position: absolute;
  bottom: 6px;
  right: 10px;
  font-size: clamp(12px, 1.8vw, 18px);
  color: #ff8888;
  opacity: 0.85;
}

/* ── Yes / No ── */
#yesno {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px 16px;
  flex-shrink: 0;
}
.yn {
  border: none;
  border-radius: 16px;
  font-size: clamp(22px, 3.8vw, 42px);
  padding: 18px;
  cursor: pointer;
  color: white;
  font-family: inherit;
  transition: opacity .1s, transform .08s;
}
.yn:active { transform: scale(.96); opacity: .85; }
#yesBtn { background: var(--yes); }
#noBtn  { background: var(--no);  }

/* ── Status bar ── */
#status {
  background: rgba(0,0,0,.35);
  padding: 8px 18px;
  font-size: clamp(14px, 2vw, 24px);
  color: var(--stat);
  flex-shrink: 0;
  min-height: 40px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── แถบเพิ่มรายการ ── */
#addBar {
  display: none;
  gap: 10px;
  padding: 8px 16px;
  flex-shrink: 0;
  background: rgba(80,136,255,.08);
  border-bottom: 1px solid #334;
}
#addBar.show { display: flex; }
#newInput {
  flex: 1;
  background: #34345a;
  border: 2px solid var(--card-b);
  border-radius: 12px;
  color: white;
  font-size: clamp(18px, 2.5vw, 26px);
  padding: 10px 14px;
  font-family: inherit;
  outline: none;
}
#newInput:focus { border-color: #90b8ff; }
#addBtn {
  background: #1a7840;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: clamp(18px, 2.5vw, 26px);
  padding: 10px 20px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <h1 id="title">โปรแกรมช่วยเหลือ</h1>
  <div id="headerBtns">
    <button id="editBtn" onclick="toggleEdit()">✏ แก้ไข</button>
  </div>
</header>

<!-- แถบเพิ่มรายการ (แสดงเฉพาะโหมดแก้ไข) -->
<div id="addBar">
  <input id="newInput" type="text" placeholder="พิมพ์รายการใหม่แล้วกด เพิ่ม">
  <button id="addBtn" onclick="addItem()">+ เพิ่ม</button>
</div>

<div id="grid"></div>

<div id="yesno">
  <button class="yn" id="yesBtn" onclick="say('ใช่')">✓&nbsp; ใช่</button>
  <button class="yn" id="noBtn"  onclick="say('ไม่')">✗&nbsp; ไม่</button>
</div>

<div id="status">พร้อมใช้งาน — แตะการ์ดเพื่อพูด</div>

<script>
// ── ข้อมูล ──────────────────────────────────────────────────
const DEFAULT = [
  "ขอน้ำดื่ม","อยากเข้าห้องน้ำ","ช่วยพยุงหน่อย",
  "เปิดพัดลม","ปิดพัดลม","เปิดไฟ",
  "ปิดไฟ","ปวดหัว","หิวข้าว",
  "โทรหาหมอ","ขอความช่วยเหลือ","อยากนอน"
];

let items    = JSON.parse(localStorage.getItem("items") || "null") || DEFAULT.slice();
let editMode = false;
let speaking = false;
let selIdx   = 0;
let lastSpeak  = 0;
let lastScroll = 0;

function save() { localStorage.setItem("items", JSON.stringify(items)); }

// ── Render กริด ─────────────────────────────────────────────
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  grid.className = editMode ? "edit-mode" : "";

  items.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "card" + (i === selIdx ? " active" : "");
    card.textContent = item;
    card.addEventListener("click", () => {
      if (editMode) {
        if (confirm(`ลบ "${item}" ใช่ไหม?`)) deleteItem(i);
      } else {
        selIdx = i; highlight(); say(item);
      }
    });
    grid.appendChild(card);
  });
}

function highlight() {
  document.querySelectorAll(".card").forEach((c, i) =>
    c.classList.toggle("active", i === selIdx));
  document.querySelectorAll(".card")[selIdx]?.scrollIntoView({ block: "nearest" });
}

// ── TTS ─────────────────────────────────────────────────────
function say(text) {
  if (speaking) return;
  const now = Date.now();
  if (now - lastSpeak < 900) return;
  lastSpeak = now;
  speaking  = true;
  setStatus("กำลังพูด: " + text);

  window.speechSynthesis.cancel();
  const u  = new SpeechSynthesisUtterance(text);
  u.lang   = "th-TH";
  u.rate   = 0.92;
  u.volume = 1;
  u.onend  = ()  => { speaking = false; setStatus("เลือก: " + text); };
  u.onerror = () => { speaking = false; setStatus("เสียงผิดพลาด — ตรวจสอบการตั้งค่า TTS"); };
  window.speechSynthesis.speak(u);
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }

// ── โหมดแก้ไข ───────────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  document.getElementById("editBtn").textContent = editMode ? "✓ เสร็จ" : "✏ แก้ไข";
  document.getElementById("addBar").className    = editMode ? "show" : "";
  if (editMode) {
    setStatus("โหมดแก้ไข — แตะการ์ดเพื่อลบ | พิมพ์ด้านบนเพื่อเพิ่ม");
  } else {
    setStatus("พร้อมใช้งาน — แตะการ์ดเพื่อพูด");
  }
  render();
}

function addItem() {
  const inp  = document.getElementById("newInput");
  const text = inp.value.trim();
  if (!text) return;
  items.push(text);
  save();
  inp.value = "";
  selIdx = items.length - 1;
  render();
}

function deleteItem(i) {
  items.splice(i, 1);
  save();
  selIdx = Math.min(selIdx, Math.max(0, items.length - 1));
  render();
}

// ── Gamepad (F710 / จอย Bluetooth) ──────────────────────────
let gpLoop = null;
let gpState = { lt: false, lb: false, back: false };

const COLS_GP = window.innerWidth < 480 ? 2 : 3;  // ตรงกับ CSS

function gpTick() {
  const gp = [...(navigator.getGamepads?.() ?? [])].find(g => g);
  if (!gp) return;

  const now = Date.now();
  const SC  = 300;
  const SEL = 1100;

  // D-pad ── เลื่อนขึ้น/ลง/ซ้าย/ขวา
  if (gp.buttons[12]?.pressed && now - lastScroll > SC) {
    selIdx = Math.max(0, selIdx - COLS_GP); highlight(); lastScroll = now;
  }
  if (gp.buttons[13]?.pressed && now - lastScroll > SC) {
    selIdx = Math.min(items.length - 1, selIdx + COLS_GP); highlight(); lastScroll = now;
  }
  if (gp.buttons[14]?.pressed && now - lastScroll > SC) {
    if (selIdx % COLS_GP > 0) { selIdx--; highlight(); } lastScroll = now;
  }
  if (gp.buttons[15]?.pressed && now - lastScroll > SC) {
    if (selIdx % COLS_GP < COLS_GP - 1 && selIdx + 1 < items.length) { selIdx++; highlight(); } lastScroll = now;
  }

  // Analog stick Y (axis 1)
  const ay = gp.axes[1] ?? 0;
  if (ay > 0.45 && now - lastScroll > SC) {
    selIdx = Math.min(items.length - 1, selIdx + COLS_GP); highlight(); lastScroll = now;
  } else if (ay < -0.45 && now - lastScroll > SC) {
    selIdx = Math.max(0, selIdx - COLS_GP); highlight(); lastScroll = now;
  }

  // Analog stick X (axis 0)
  const ax = gp.axes[0] ?? 0;
  if (ax > 0.45 && now - lastScroll > SC) {
    if (selIdx % COLS_GP < COLS_GP - 1 && selIdx + 1 < items.length) { selIdx++; highlight(); } lastScroll = now;
  } else if (ax < -0.45 && now - lastScroll > SC) {
    if (selIdx % COLS_GP > 0) { selIdx--; highlight(); } lastScroll = now;
  }

  // LB (4) หรือ L3 (10) → เลือกการ์ด
  const lb = gp.buttons[4]?.pressed || gp.buttons[10]?.pressed;
  if (lb && !gpState.lb && now - lastSpeak > SEL) { say(items[selIdx]); }
  gpState.lb = lb;

  // LT = button 6 ใน browser (Standard Gamepad mapping) → ใช่
  const lt = gp.buttons[6]?.pressed;
  if (lt && !gpState.lt) { say("ใช่"); gpState.lt = true; }
  if (!lt) gpState.lt = false;

  // Back = button 8 ใน browser → ไม่
  const back = gp.buttons[8]?.pressed;
  if (back && !gpState.back && now - lastSpeak > SEL) { say("ไม่"); }
  gpState.back = back;
}

window.addEventListener("gamepadconnected", e => {
  setStatus("เชื่อมต่อจอย: " + e.gamepad.id);
  gpLoop = gpLoop || setInterval(gpTick, 50);
});
window.addEventListener("gamepaddisconnected", () => {
  clearInterval(gpLoop); gpLoop = null;
  setStatus("ตัดการเชื่อมต่อจอย");
});

// ── เพิ่มด้วย Enter ─────────────────────────────────────────
document.getElementById("newInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});

// ── เริ่มต้น ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
